version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskmanager
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/taskmanager
      JWT_SECRET: taskmanager_super_secret_jwt_key_2024_xK9mP2
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local
